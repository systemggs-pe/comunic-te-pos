[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/reniec"
  to = "/.netlify/functions/reniec"
  status = 200

[[redirects]]
  from = "/api/analizarCajaGemini"
  to = "/.netlify/functions/analizarCajaGemini"
  status = 200

[[redirects]]
  from = "/api/clientes"
  to = "/.netlify/functions/clientes"
  status = 200

[[redirects]]
  from = "/api/legalConsent"
  to = "/.netlify/functions/legalConsent"
  status = 200

[[redirects]]
  from = "/api/registros"
  to = "/.netlify/functions/registros"
  status = 200

[[redirects]]
  from = "/api/ventas"
  to = "/.netlify/functions/ventas"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
